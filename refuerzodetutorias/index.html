<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio de refuerzo</title>
</head>
<body>
    <h1>Registro de usuarios</h1>

    <div>
        <form id="formularioEstudiantes">
            <label>Nombre:</label>
            <input type="text" id="nombre">
            <br><br>
            <label>Edad:</label>
            <input type="number" id="edad">
            <br><br>
            <label>Nota-1</label>
            <input type="number" id="nota1">

            <label>Nota-2</label>
            <input type="number" id="nota2">

            <label>Nota-3</label>
            <input type="number" id="nota3">
            <br><br>
            <button type="submit">Registrar notas de estudiantes</button>
        </form>
    </div>
    <hr>
    <div>
        <h2>Resultado de la asignatura</h2>
        <table border="1">
            <thead> 
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Promedio</th>
                <th>Estado</th>
            
            </tr>
        </thead>
        <tbody id="tableEstudiantes"></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
