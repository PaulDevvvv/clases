<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAMEN-FORMULARIO</title>
</head>
<body>
    <h2>Inscripción</h2>
    <div> 
    <form id="FormInscripcion">
        <label for="nombre">Nombre Completo:</label>
        <input type="text" id="nombre" name="nombre" required>
     </div>
     <br>
     <div>
        <label for="correo">Correo Electrónico:</label>
        <input type="email" id="correo" name="correo" required>
     </div>
     <br>

        <div>
        <label for="carnet">Ingrese su numero de carnet</label>
        <input type="number" id="carnet" name="carnet" required>
        </div>
        <br>

        <div>
        <label for="telefono">Numero de telefono:</label>
        <input type="number" id="telefono" name="telefono" required>
    </div>
    <br>
        <div>
            
        <label for="departamentos">Seleccione su departamento:</label>
        <select id="departamentos" name="departamentos" required>
            <option value=".">...</option>
            <option value="m">Morazan</option>
            <option value="sm">San Miguel</option>
            <option value="l">La Unión</option>
            <option value="c">Chalatenango</option>
        </select>
        </div>

        <br>
        <div>
            <label for="cursos">Seleccione su curso:</label>
            <select id="cursos" name="cursos" required>
                <option value=".">...</option>
                <option value="matematicas">Matemáticas - 12 Meses 120$ - Virtual</option>
                <option value="espanol">Español - 6 Meses 60$ - Presencial</option>
                <option value="ciencias">Ciencias 1 Año 240$ - Presencial</option>
                <option value="informatica">Informática - 1 Año y 2 Meses 180$ - Virtual</option>
                <option value="agronomia">Agronomía - 3 Meses 90$ - Presencial</option>
                <option value="fisica">Física - 5 Meses 150$ - Presencial</option>
            </select>

            <button type="submit">Inscribirse</button>
        </div>
        <script src="app2.js"></script>
    </form>
</body>
</html>
