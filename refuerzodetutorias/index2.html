<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card">
            <div class="card-body"> <h2 class="text-center mb-4">Este sistema sera de estudiantes</h2>
                <div class="row g-2">
                    <div class="col-md-6">
                        <input type="text" id="nombre" class="form-control" placeholder="Ingresa el nombre del estudiantes">
                        <input type="number" id="nota" class="form-control" placeholder="Ingresa la nota del estudiantes 0-10">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button onclick="agregarEstudiante()" class="btn btn-primary">Agregar</button>
                    </div>
                    <div>
                        <button onclick="mostrarTodos()" class="btn btn-secondary btn-sm">Todos</button>
                        <button onclick="mostrarReprobados()" class="btn btn-danger btn-sm">Reprobados</button>
                        <button onclick="mostrarAprobados()" class="btn btn-success btn-sm">Aprobados</button>
                    </div>
                    <h4 id="promedio" class="text-center mt-4">Promedio de notas: 0</h4>
                </div>
                
                <div class="card-shadow mt-4">
                    <table class="table table-striped table-hover text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th> <th>Nombre</th>
                                <th>Nota</th>
                                <th>Estado</th>
                                <th>Accion</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-estudiantes"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
