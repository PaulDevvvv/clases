<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="card mx-auto " style="width: 40rem; margin-top: 10px;">
        <div class="card-body p-4">
            <p class="card-text">Ingrese los datos del producto:</p>
            <input type="text" name="producto" id="producto" class="form-control" placeholder="Ingresar Producto"> <br>
            <input type="number" name="precio" id="precio" class="form-control" placeholder="Ingresar Precio"><br>
            <input type="number" name="numero" id="identificacion" class="form-control" placeholder="Ingresar Identificacion">
        </div>
        <div class="d-flex justify-content-center p-2"><button onclick="agregarProducto()" type="button" class="btn btn-outline-secondary">Agregar productos</button></div>
        <h4 id="productos" class="card-title text-center">Productos en el carrito: </h4>
        <div class="col-md-12">
            <table class="table table-striped table-hover text-center table-borderless rounded">
                <thead class="table-secondary">
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Identificacion</th>
                    </tr>
                </thead>
                <tbody id="tabla-productos"></tbody>
            </table>
        </div>
    </div>
    
    
    <script src="comercial.js"></script>
</body>
</html>
