<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuarios</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif;
       background-color: #f4f7f6; 
       display: flex; 
       flex-direction: column; 
       align-items: center; 
       padding: 20px; }

        .container { 
        background: white; 
        padding: 25px; 
        border-radius: 8px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        width: 100%; 
        max-width: 500px; 
        margin-bottom: 30px; }

        h2 {
            color: #333; 
            text-align: center; }
        
        .form-group { 
             margin-bottom: 15px; }
        label { display: block; 
             margin-bottom: 5px;
             font-weight: bold; 
             color: #555; }
        input, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box; }
        textarea {
            resize: vertical; 
            height: 80px; }
        
        button { 
            width: 100%; 
            padding: 10px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; }
        .btn-save { 
            background-color: #2ecc71; 
            color: white; }
        .btn-save:hover { 
            background-color: #27ae60; }
        .btn-edit { 
            background-color: #3498db; 
            color: white;
            width: auto; 
            padding: 5px 10px; 
            font-size: 12px; }


        table { 
            width: 100%; 
            max-width: 800px; 
            border-collapse: collapse; 
            background: white; 
            border-radius: 8px; 
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { 
            padding: 12px 15px;
             text-align: left;
              border-bottom: 1px solid #ddd; }
        th { 
            background-color: #34495e; 
            color: white; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Registro de Datos</h2>
        <form id="userForm">
            <input type="hidden" id="editIndex" value="-1">
            
            <div class="form-group">
                <label>Nombre Completo:</label>
                <input type="text" id="nombre" required>
            </div>
            <div class="form-group">
                <label>Correo Electrónico:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Añadir mensaje:</label>
                <textarea id="descripcion" placeholder="Escribe aquí..."></textarea>
            </div>
            <button type="submit" class="btn-save" id="btnSubmit">Registrar</button>
        </form>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script src="app2.js">

    </script>
</body>
</html>
